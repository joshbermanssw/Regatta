<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Regatta">
  <title>Regatta (mono)</title>
  <!-- Single-color mark. Uses currentColor so it inherits ink from context
       (Hull White on dark, Deck Black on light). Fleet depth via opacity tiers. -->
  <g fill="currentColor">
    <path d="M30 52 L30 94 L50 94 Z" fill-opacity="0.35"/>
    <path d="M54 38 L54 94 L74 94 Z" fill-opacity="0.60"/>
    <path d="M80 18 L80 94 L110 94 Z"/>
    <!-- burgee, outlined so it reads in one color -->
    <path d="M80 16 L99 21 L80 26 Z" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linejoin="round"/>
    <rect x="22" y="98" width="94" height="3" rx="1.5"/>
    <rect x="28" y="105" width="40" height="2" rx="1" fill-opacity="0.45"/>
  </g>
</svg>
