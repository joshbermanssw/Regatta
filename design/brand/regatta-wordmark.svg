<svg width="430" height="128" viewBox="0 0 430 128" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Regatta">
  <title>Regatta wordmark</title>
  <!-- Horizontal lockup: fleet mark + wordmark. Production wordmark should outline
       the text to paths; font-family is specified here for working files. -->
  <defs>
    <linearGradient id="lead2" x1="80" y1="18" x2="110" y2="94" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3DA0FF"/>
      <stop offset="1" stop-color="#1E90FF"/>
    </linearGradient>
  </defs>

  <!-- mark -->
  <g>
    <path d="M30 52 L30 94 L50 94 Z" fill="#1E90FF" fill-opacity="0.32"/>
    <path d="M54 38 L54 94 L74 94 Z" fill="#1E90FF" fill-opacity="0.58"/>
    <path d="M80 18 L80 94 L110 94 Z" fill="url(#lead2)"/>
    <path d="M80 16 L99 21 L80 26 Z" fill="#00FF9C"/>
    <rect x="22" y="98" width="94" height="3" rx="1.5" fill="#1E90FF"/>
    <rect x="28" y="105" width="40" height="2" rx="1" fill="#1E90FF" fill-opacity="0.40"/>
  </g>

  <!-- wordmark -->
  <text x="140" y="80"
        font-family="Space Grotesk, Inter, -apple-system, Segoe UI, sans-serif"
        font-size="56" font-weight="600" letter-spacing="-1.5"
        fill="#FFFFFF">Regatta</text>
</svg>
